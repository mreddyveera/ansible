- name: create ec2 and route53 records
  hosts: local
  connection: local
  vars:
    subnet_id: subnet-0ab0069d48c77c5ad
    sg_id: sg-012e99eac79c47915
    instances:
    - mysql
    - backend
    - frontend
    ami_id: ami-0220d79f3f480ecf5
    instance_type: t3.micro
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      subnet_id: "{{subnet_id}}"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id}}"
      instance_type: "{{ instance_type }}"
    loop: "{{ instances}}"
