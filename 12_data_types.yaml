- name: Devops course information
  hosts: local
  connection: local
  vars:
      course_name: "Devops with AWS" #string
      duration: 120 #number
      topics: #list
      - linux
      - shell
      - terraform
      - AWS
      live: true #boolean
      tools: #map
        ci: jenkin
        cloud: AWS
        containerization: docker
  tasks:
    - name: print the course information|
      ansible.builtin.debug:
        msg: "Hello I am learning {{course_name}} with duration {{ duration }}, topics are: {{ topics }}, is it {{ live }}, tools covered are : {{ tools }}"